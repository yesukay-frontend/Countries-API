<div
  class="flex flex-col md:flex-row md:justify-between md:items-center gap-8 md:gap-0 mb-10"
>
  <form
    class="flex items-center w-full md:w-96 bg-white rounded-md shadow-md px-4 py-3"
  >
    <i class="fas fa-search text-gray-400"></i>
    <input
      aria-label="Search for a country"
      class="ml-3 w-full text-sm text-gray-500 placeholder-gray-400 focus:outline-none"
      placeholder="Search for a country..."
      type="search"
    />
  </form>

  <div class="relative w-48">
    <button
      aria-expanded="false"
      aria-haspopup="listbox"
      class="w-full bg-white rounded-md shadow-md px-4 py-3 text-sm text-gray-900 flex justify-between items-center cursor-pointer"
      id="regionFilterBtn"
      type="button"
    >
      Filter by Region
      <i class="fas fa-chevron-down text-gray-600"></i>
    </button>
    <ul
      aria-labelledby="regionFilterBtn"
      class="absolute right-0 mt-1 w-full bg-white rounded-md shadow-lg text-gray-900 text-sm hidden"
      id="regionFilterList"
      role="listbox"
    >
      <li
        class="px-4 py-2 hover:bg-gray-100 cursor-pointer"
        role="option"
        tabindex="0"
      >
        Africa
      </li>
      <li
        class="px-4 py-2 hover:bg-gray-100 cursor-pointer"
        role="option"
        tabindex="0"
      >
        America
      </li>
      <li
        class="px-4 py-2 hover:bg-gray-100 cursor-pointer"
        role="option"
        tabindex="0"
      >
        Asia
      </li>
      <li
        class="px-4 py-2 hover:bg-gray-100 cursor-pointer"
        role="option"
        tabindex="0"
      >
        Europe
      </li>
      <li
        class="px-4 py-2 hover:bg-gray-100 cursor-pointer"
        role="option"
        tabindex="0"
      >
        Oceania
      </li>
    </ul>
  </div>
</div>
