<article
  class="bg-white rounded-md shadow-md overflow-hidden max-w-xs"
  (click)="openCountryDetails()"
>
  <img
    [src]="country.flags.png"
    [alt]="'Flag of ' + country.name"
    class="w-full h-40 object-cover"
    width="400"
    height="250"
  />
  <div class="p-6">
    <h2 class="font-extrabold text-base mb-3 select-none">
      {{ country.name.common }}
    </h2>
    <p class="text-xs mb-1">
      <strong>Population:</strong> {{ country.population | number }}
    </p>
    <p class="text-xs mb-1"><strong>Region:</strong> {{ country.region }}</p>
    <p class="text-xs"><strong>Capital:</strong> {{ country.capital }}</p>
  </div>
</article>
