<ng-container *ngIf="countries$ | async as countries">
  <div class="bg-gray-50 text-gray-900 min-h-screen">
    <app-header></app-header>

    <main class="px-8 py-10 max-w-7xl mx-auto">
      <app-search-filter
        (search)="onSearch($event)"
        (filter)="onFilter($event)"
      ></app-search-filter>

      <div *ngIf="loading$ | async" class="text-center py-10 text-gray-500">
        Loading countries...
      </div>

      <section
        *ngIf="countries.length > 0; else emptyState"
        aria-label="Country cards"
        class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-4 gap-10"
      >
        <app-country-card
          *ngFor="let country of countries$ | async"
          [country]="country"
        ></app-country-card>
      </section>

      <ng-template #emptyState>
        <div class="text-center mt-20 text-gray-500 dark:text-gray-400">
          <p class="text-xl font-semibold">No countries found</p>
          <p class="text-sm">Try adjusting your search or region filter.</p>
        </div>
      </ng-template>
    </main>
  </div>
</ng-container>
